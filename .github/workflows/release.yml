name: release
on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CHANGESETS_APP_ID }}
          private-key: ${{ secrets.CHANGESETS_KEY }}
          installation-id: ${{ vars.CHANGESETS_INSTALL_ID }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply pending changesets
        run: bunx changeset version

      - name: Detect version changes
        id: detect
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "changesets[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): v${{ steps.detect.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Tag release
        if: steps.detect.outputs.changed == 'true'
        id: tag
        run: |
          TAG="v${{ steps.detect.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
